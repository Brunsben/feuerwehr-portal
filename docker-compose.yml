# ─────────────────────────────────────────────────────────────────────────────
# Feuerwehr Portal — Master Docker Compose
# Orchestriert alle Feuerwehr-Anwendungen unter einem gemeinsamen Netzwerk.
#
# Verwendung:
#   cp .env.example .env    # Secrets eintragen
#   docker compose up -d    # Alle Services starten
#
# Architektur:
#   Portal (nginx:80) ─┬─ /        → Portal SPA
#                       ├─ /psa/    → PSA-Frontend (nginx → PostgREST)
#                       ├─ /food/   → FoodBot (Flask/Gunicorn)
#                       └─ /fk/     → Führerscheinkontrolle (Next.js)
#
#   Alle Services teilen sich die PostgreSQL-Instanz (Schemas: fw_common,
#   fw_psa, fw_food, fw_fuehrerschein) und das fw-network.
#
# Verzeichnisstruktur (erwartet):
#   Passe die relativen Pfade (../psa/, ../FoodBot/, ../Führerscheinkontrolle/)
#   an dein lokales Layout an, oder nutze absolute Pfade / Git-Submodules.
#
#   ~/Documents/
#   ├── portal/              ← dieses Repo (docker-compose.yml hier)
#   ├── psa/                 ← PSA-Verwaltung
#   ├── FoodBot/             ← FoodBot
#   └── Führerscheinkontrolle/
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Portal (Reverse-Proxy + Landingpage) ──────────────────────────────────
  portal:
    build:
      context: .
    container_name: fw_portal
    ports:
      - "${PORTAL_PORT:-8180}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ./config.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      psa-frontend:
        condition: service_healthy
      auth-proxy:
        condition: service_started
    networks:
      - fw-network
    restart: unless-stopped

  # ── Auth-Proxy (httpOnly-Cookie-basierte Portal-Authentifizierung) ────────
  auth-proxy:
    image: node:22-alpine
    container_name: fw_auth
    command: node /app/server.js
    volumes:
      - ./auth-proxy/server.js:/app/server.js:ro
    environment:
      POSTGREST_HOST: postgrest
      POSTGREST_PORT: "3000"
    depends_on:
      postgrest:
        condition: service_started
    networks:
      - fw-network
    restart: unless-stopped

  # ── PostgreSQL (gemeinsame Datenbank) ─────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: fw_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocodb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nocodb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fw-network
    restart: unless-stopped

  # ── PostgREST (REST API für PSA) ──────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v14.5
    container_name: fw_postgrest
    environment:
      PGRST_DB_URI: "postgresql://psa_auth:${POSTGREST_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-nocodb}"
      PGRST_DB_SCHEMAS: "fw_common,fw_psa"
      PGRST_DB_ANON_ROLE: "psa_anon"
      PGRST_SERVER_PORT: "3000"
      PGRST_DB_POOL: "5"
      PGRST_JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fw-network
    restart: unless-stopped

  # ── PSA-Frontend (Schutzausrüstungs-Verwaltung) ──────────────────────────
  psa-frontend:
    build:
      context: ../psa/frontend
    container_name: fw_psa
    volumes:
      - ../psa/setup/nginx.conf.template:/etc/nginx/conf.d/default.conf:ro
      - ../psa/setup/nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ../psa/frontend/config.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      postgrest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - fw-network
    restart: unless-stopped

  # ── FoodBot (Essensbestellung — Flask) ────────────────────────────────────
  foodbot:
    build:
      context: ../FoodBot
    container_name: fw_foodbot
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-nocodb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nocodb}"
      JWT_SECRET: "${JWT_SECRET}"
      ADMIN_PASSWORD: "${FOODBOT_ADMIN_PASSWORD}"
      FLASK_ENV: "production"
      SECRET_KEY: "${FOODBOT_SECRET_KEY}"
      APPLICATION_ROOT: "/food"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fw-network
    restart: unless-stopped

  # ── Führerscheinkontrolle (Next.js) ───────────────────────────────────────
  fuehrerschein:
    build:
      context: ../Führerscheinkontrolle
    container_name: fw_fuehrerschein
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-nocodb}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nocodb}"
      AUTH_SECRET: "${FK_AUTH_SECRET}"
      AUTH_URL: "http://localhost:3000"
      JWT_SECRET: "${JWT_SECRET}"
      ENCRYPTION_KEY: "${FK_ENCRYPTION_KEY}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      UPLOAD_DIR: "/app/data/uploads"
      BACKUP_API_KEY: "${FK_BACKUP_API_KEY:-}"
    volumes:
      - fk_uploads:/app/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/fk/').then(r=>{process.exit(r.ok||r.status===307?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - fw-network
    restart: unless-stopped

  # ── Uptime Kuma (Monitoring) ──────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: fw_uptime
    volumes:
      - uptime_data:/app/data
    ports:
      - "${UPTIME_PORT:-3001}:3001"
    networks:
      - fw-network
    restart: unless-stopped

networks:
  fw-network:
    name: fw-network
    driver: bridge

volumes:
  postgres_data:
  uptime_data:
  fk_uploads:
