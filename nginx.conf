server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security-Headers ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;

    # ── Portal SPA (Startseite) ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }
    }

    location = /config.js {
        add_header Cache-Control "no-cache, must-revalidate";
        expires 0;
    }

    # ── Auth-Proxy (httpOnly-Cookie-basierte Authentifizierung) ──
    location ^~ /api/auth/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://auth-proxy:3002/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store";
    }

    # ── Statische Assets (JS/CSS/Icons) cachen ────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── PSA-Verwaltung (/psa/) ────────────────────────────
    location ^~ /psa/ {
        proxy_pass http://psa-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # PSA API durchreichen (wird von PSA-nginx intern auf PostgREST gemappt)
    location ^~ /psa/api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass http://psa-frontend:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        add_header Cache-Control "no-store";
    }

    # Docker-interner DNS-Resolver (damit optionale Upstreams nicht beim Start crashen)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── FoodBot (/food/) ──────────────────────────────────
    location ^~ /food/ {
        set $foodbot_upstream http://foodbot:5001;
        rewrite ^/food/(.*) /$1 break;
        proxy_pass $foodbot_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /food;
        proxy_http_version 1.1;
        # WebSocket für RFID
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Führerscheinkontrolle (/fk/) ─────────────────────
    location ^~ /fk {
        set $fk_upstream http://fuehrerschein:3000;
        proxy_pass $fk_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # ── Health-Endpoint (für Uptime-Kuma / Monitoring) ────
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
