<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vorübergehend nicht erreichbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           display: flex; align-items: center; justify-content: center;
           min-height: 100vh; background: #f3f4f6; color: #1f2937; }
    .card { text-align: center; padding: 3rem 2rem; max-width: 480px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #dc2626; }
    p { color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    a { display: inline-block; padding: 0.6rem 1.5rem; background: #dc2626;
        color: #fff; text-decoration: none; border-radius: 0.5rem; font-weight: 500; }
    a:hover { background: #b91c1c; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚒</div>
    <h1>Dienst vorübergehend nicht erreichbar</h1>
    <p>Der angeforderte Dienst ist gerade nicht verfügbar. Bitte versuche es in ein paar Sekunden erneut.</p>
    <a href="/">Zurück zum Portal</a>
  </div>
</body>
</html>
