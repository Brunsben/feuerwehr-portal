# Cloudflare schickt die echte Client-IP und Proto
# $scheme ist intern immer http — wir nutzen den Header von Cloudflare
map $http_x_forwarded_proto $real_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    listen 8080 default_server;
    server_name portal.example.org _;
    server_tokens off;

    # ── Gzip-Kompression ──────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;

    # ── Proxy-Defaults ───────────────────────────────────────
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    proxy_buffering       on;
    proxy_buffer_size     128k;
    proxy_buffers         4 256k;

    # Cloudflare Real-IP vertrauen
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    real_ip_header CF-Connecting-IP;

    # ── Security-Headers ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Next.js benötigt 'unsafe-inline' für RSC-Payloads und Hydration
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(self), microphone=()" always;

    # ── Custom Error-Pages ────────────────────────────────
    error_page 502 503 504 /error-backend.html;
    location = /error-backend.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ── Portal (Next.js) ──────────────────────────────────
    # Alle Portal-Seiten und API-Routes werden an Next.js durchgereicht
    location / {
        set $portal_upstream http://portal:8080;
        proxy_pass $portal_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_http_version 1.1;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(self), microphone=()" always;
    }

    # ── Auth API (Rate-Limited) ───────────────────────────
    location ^~ /api/auth/ {
        limit_req zone=api burst=10 nodelay;
        set $portal_upstream http://portal:8080;
        proxy_pass $portal_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_http_version 1.1;

        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
    }

    # Docker-interner DNS-Resolver (damit optionale Upstreams nicht beim Start crashen)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Führerscheinkontrolle (/fk/) ─────────────────────
    # Wird jetzt direkt vom Portal bedient (location / fängt alles ab)

    # ── PostgREST API für n8n (API-Key im Pfad) ─────────────
    # URL-Format: /n8n/<KEY>/postgrest/<endpoint>
    # Ohne gültigen Key matcht die Location nicht → 404
    # Key wird per envsubst aus N8N_API_KEY injiziert (siehe docker-compose)
    location ~ ^/n8n/${N8N_API_KEY}/postgrest/(.*)$ {
        limit_req zone=api burst=60 nodelay;
        set $postgrest_upstream http://postgrest:3000;
        proxy_pass $postgrest_upstream/$1$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_proto;
        proxy_http_version 1.1;

        # Kein Authorization-Header weiterleiten (anonymer Zugriff)
        proxy_set_header Authorization "";

        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;
    }

    # ── Health-Endpoint (für Uptime-Kuma / Monitoring) ────
    location = /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
