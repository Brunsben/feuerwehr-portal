# ─────────────────────────────────────────────────────────────────────────────
# Feuerwehr Portal — Master Docker Compose
# Orchestriert alle Feuerwehr-Anwendungen unter einem gemeinsamen Netzwerk.
#
# Verwendung:
#   cp .env.example .env    # Secrets eintragen
#   docker compose up -d    # Alle Services starten
#
# Architektur:
#   Portal (nginx:80) ─┬─ /        → Portal SPA
#                       ├─ /psa/    → PSA-Frontend (nginx → PostgREST)
#                       ├─ /food/   → FoodBot (Flask/Gunicorn)
#                       └─ /fk/     → Führerscheinkontrolle (Next.js)
#
#   Alle Services teilen sich die PostgreSQL-Instanz (Schemas: fw_common,
#   fw_psa, fw_food, fw_fuehrerschein) und das fw-network.
#
# Verzeichnisstruktur (erwartet):
#   Alle Repos liegen als Geschwister-Ordner nebeneinander:
#
#   ~/fw/
#   ├── feuerwehr-portal/    ← dieses Repo (docker-compose.yml hier)
#   ├── psa-verwaltung/      ← PSA-Verwaltung
#   ├── FoodBot/             ← FoodBot
#   └── FK-App/              ← Führerscheinkontrolle
# ─────────────────────────────────────────────────────────────────────────────

# ── Logging Default (schützt Pi-Disk vor Log-Explosion) ─────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Portal (Reverse-Proxy + Landingpage) ──────────────────────────────────
  portal:
    build:
      context: .
    container_name: fw_portal
    logging: *default-logging
    ports:
      - "${PORTAL_PORT:-8180}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ./config.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      psa-frontend:
        condition: service_healthy
      auth-proxy:
        condition: service_started
    networks:
      - fw-network
    restart: unless-stopped

  # ── Auth-Proxy (httpOnly-Cookie-basierte Portal-Authentifizierung) ────────
  auth-proxy:
    image: node:22-alpine@sha256:8094c002d08262dba12645a3b4a15cd6cd627d30bc782f53229a2ec13ee22a00
    container_name: fw_auth
    logging: *default-logging
    command: node /app/server.js
    volumes:
      - ./auth-proxy/server.js:/app/server.js:ro
    environment:
      POSTGREST_HOST: postgrest
      POSTGREST_PORT: "3000"
      JWT_SECRET: "${JWT_SECRET}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/me || exit 0"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgrest:
        condition: service_started
    networks:
      - fw-network
    restart: unless-stopped

  # ── PostgreSQL (gemeinsame Datenbank) ─────────────────────────────────────
  postgres:
    image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
    container_name: fw_postgres
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nocodb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nocodb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nocodb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fw-network
    restart: unless-stopped

  # ── PostgREST (REST API für PSA) ──────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v14.5@sha256:b574528fe109c8343c1247155734d03df8c34b462f342dca0ccc20244fc36ef9
    container_name: fw_postgrest
    logging: *default-logging
    environment:
      PGRST_DB_URI: "postgresql://psa_auth:${POSTGREST_DB_PASSWORD}@postgres:5432/${POSTGRES_DB:-nocodb}"
      PGRST_DB_SCHEMAS: "pxicv3djlauluse"
      PGRST_DB_ANON_ROLE: "psa_anon"
      PGRST_SERVER_PORT: "3000"
      PGRST_DB_POOL: "10"
      PGRST_JWT_SECRET: "${JWT_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fw-network
    restart: unless-stopped

  # ── PSA-Frontend (Schutzausrüstungs-Verwaltung) ──────────────────────────
  psa-frontend:
    build:
      context: ../psa-verwaltung/frontend
    container_name: fw_psa
    logging: *default-logging
    volumes:
      - ../psa-verwaltung/setup/nginx.conf.template:/etc/nginx/conf.d/default.conf:ro
      - ../psa-verwaltung/setup/nginx-ratelimit.conf:/etc/nginx/conf.d/ratelimit.conf:ro
      - ../psa-verwaltung/frontend/config.portal.js:/usr/share/nginx/html/config.js:ro
    depends_on:
      postgrest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - fw-network
    restart: unless-stopped

  # ── FoodBot (Essensbestellung — Flask + SQLite) ───────────────────────────
  foodbot:
    build:
      context: ../FoodBot
    container_name: fw_foodbot
    logging: *default-logging
    environment:
      SECRET_KEY: "${FOODBOT_SECRET_KEY:?FOODBOT_SECRET_KEY muss in .env gesetzt sein}"
      DATABASE_URI: "sqlite:////app/data/foodbot.db"
      ADMIN_PASSWORD: "${FOODBOT_ADMIN_PASSWORD:?FOODBOT_ADMIN_PASSWORD muss in .env gesetzt sein}"
      JWT_SECRET: "${JWT_SECRET}"
      POSTGREST_URL: "http://postgrest:3000"
      APPLICATION_ROOT: "/food"
    volumes:
      - foodbot_data:/app/data
    depends_on:
      postgrest:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - fw-network
    restart: unless-stopped

  # ── Führerscheinkontrolle (Next.js + SQLite) ─────────────────────────────
  fuehrerschein:
    build:
      context: ../FK-App
    container_name: fw_fuehrerschein
    logging: *default-logging
    environment:
      PROJECT_ROOT: "/app"
      DATABASE_PATH: "/app/data/fuehrerscheinkontrolle.db"
      JWT_SECRET: "${JWT_SECRET}"
      AUTH_PROXY_URL: "http://auth-proxy:3002"
      ENCRYPTION_KEY: "${FK_ENCRYPTION_KEY}"
      BACKUP_API_KEY: "${FK_BACKUP_API_KEY}"
    volumes:
      - fk_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/fk').then(r=>{process.exit(r.ok||r.status===307||r.status===308?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - fw-network
    restart: unless-stopped

  # ── Uptime Kuma (Monitoring) ──────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:2@sha256:32c352a235fd10f98b3f64a6a4345d3c0c7f4e8be7810d2e1e867f7fe2e48ba2
    container_name: fw_uptime
    logging: *default-logging
    volumes:
      - uptime_data:/app/data
    ports:
      - "${UPTIME_PORT:-3001}:3001"
    networks:
      - fw-network
    restart: unless-stopped

networks:
  fw-network:
    name: fw-network
    driver: bridge

volumes:
  postgres_data:
    external: true
    name: setup_postgres_data
  uptime_data:
  foodbot_data:
  fk_data:
